server.port=8080
spring.application.name=customer-analytics-platform

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:analyticsdb}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

aws.s3.bucket=${AWS_S3_BUCKET:analytics-reports}
aws.s3.region=${AWS_REGION:us-east-1}
aws.access-key=${AWS_ACCESS_KEY:}
aws.secret-key=${AWS_SECRET_KEY:}

airflow.base-url=${AIRFLOW_URL:http://localhost:8081}
airflow.username=${AIRFLOW_USER:admin}
airflow.password=${AIRFLOW_PASS:admin}

management.endpoints.web.exposure.include=health,info,metrics,prometheus
